version: '3.9' # if you are in compose v2 you can comment/delete this entire line

services:
  db:
    build: ./DB
    container_name: nevers_postgis
    env_file: ./.env
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./DATA/clean:/import:ro
      - ./DB/init_db:/docker-entrypoint-initdb.d:ro
      - ./SQL:/SQL
    restart: "no"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: 
      - routing_net

# ----------------------------
# DEV EXPORT SERVICE : BUILDER
# ----------------------------

  builder_dev:
    image: postgres:16
    profiles: ["devtools"]
    env_file: ./.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./SQL:/SQL:ro
      - ./exports:/exports
    user: "${UID}:${GID}"
    networks: 
      - routing_net


  api:
    build: ./app
    container_name: nevers_api
    env_file: ./.env
    ports:
      - "${FLASK_PORT}:5000"
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/test_db"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: 
      - routing_net

# ----------------------------
  # PIPELINE : LOADER
  # ----------------------------

  loader:
    profiles: ["pipeline"]
    build: ./docker/loader
    container_name: nevers_loader
    env_file: ./.env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./DATA/clean:/import
      - ./SQL:/SQL:ro
      - ./docker/loader:/loader:ro
    command: ["bash", "/loader/import_all.sh"]
    networks: 
      - routing_net



  # ----------------------------
  # PIPELINE : BUILDER
  # ----------------------------
  builder:
    profiles: ["pipeline"]
    image: postgres:16  
    container_name: nevers_builder
    env_file: ./.env
    depends_on:
      db:
        condition: service_healthy
      loader:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - ./SQL:/SQL:ro
      - ./exports:/exports
      - ./docker/builder:/builder:ro
    command: ["bash", "/builder/run_master_all.sh"]
    networks: 
      - routing_net

networks:
  routing_net:
    driver: bridge
    name: routing_net

volumes:
  pgdata:
