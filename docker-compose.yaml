version: '3.9' # if you are in compose v2 you can comment/delete this entire line

services:
  db:
    build: ./DB
    container_name: nevers_postgis
    env_file: ./.env
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./DATA/clean:/import:ro
      - ./DB/init_db:/docker-entrypoint-initdb.d:ro
      - ./SQL:/SQL
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./app
    container_name: nevers_api
    env_file: ./.env
    ports:
      - "${FLASK_PORT}:5000"
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/api/test_db').status==200 else sys.exit(1)" ]
      interval: 5s
      timeout: 5s
      retries: 10
# ----------------------------
  # PIPELINE (stub) : LOADER
  # ----------------------------
  loader:
    image: postgres:16
    profiles: ["pipeline"]
    env_file: ./.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./DATA/clean:/import:ro
    user: "${UID}:${GID}"
    command: >
      bash -lc "
        echo '[loader] waiting db...';
        until psql -v ON_ERROR_STOP=1 -c 'SELECT 1' >/dev/null; do sleep 1; done;

        echo '[loader] set data_loaded=true (stub)';
        psql -v ON_ERROR_STOP=1 -c \"
          CREATE SCHEMA IF NOT EXISTS meta;
          CREATE TABLE IF NOT EXISTS meta.pipeline_state (
            key text PRIMARY KEY,
            value text NOT NULL,
            updated_at timestamptz NOT NULL DEFAULT now()
          );
          INSERT INTO meta.pipeline_state(key, value)
          VALUES ('data_loaded', 'true')
          ON CONFLICT (key) DO UPDATE
            SET value = EXCLUDED.value,
                updated_at = now();
        \";

        echo '[loader] done';
      "

  # ----------------------------
  # PIPELINE (stub) : BUILDER
  # ----------------------------
  builder:
    image: postgres:16
    profiles: ["pipeline"]
    env_file: ./.env
    depends_on:
      loader:
        condition: service_completed_successfully
    volumes:
      - ./SQL:/SQL:ro
      - ./exports:/exports
    user: "${UID}:${GID}"
    command: >
      bash -lc "
              echo '[builder] waiting for data_loaded flag...';
              until psql -v ON_ERROR_STOP=1 -tAc \"SELECT value FROM meta.pipeline_state WHERE key='data_loaded'\" | grep -qx 'true'; do sleep 1; done;

              echo '[builder] set graph_built=true (stub)';
              psql -v ON_ERROR_STOP=1 -c \"
                INSERT INTO meta.pipeline_state(key, value)
                VALUES ('graph_built', 'true')
                ON CONFLICT (key) DO UPDATE
                  SET value = EXCLUDED.value,
                      updated_at = now();
              \";

              echo '[builder] done';
            "


volumes:
  pgdata:
