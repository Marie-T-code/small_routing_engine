# .github/workflows/tests.yml
name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Create .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_DB=nevers
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          PG_PORT=5433
          PGHOST=db
          PGPORT=5432
          PGUSER=postgres
          PGPASSWORD=postgres
          PGDATABASE=nevers
          FLASK_PORT=5000
          FLASK_DEBUG=True
          UID=1000
          GID=1000
          EOF


      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt


      - name: Run tests
        run: pytest tests/pytest -v